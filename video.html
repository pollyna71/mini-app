<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Vidéo</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: linear-gradient(to right, #4facfe, #00f2fe);
    text-align: center;
    color: white;
}

.container {
    margin-top: 40px;
}

video {
    width: 90%;
    max-width: 400px;
    border-radius: 15px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

a {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    background: white;
    color: #333;
    border-radius: 10px;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="container">
    <h1>🎥 Ma vidéo</h1>

    <video controls>
        <source src="mavideo.mp4" type="video/mp4">
    </video>

    <br>
    <a href="index.html">⬅ Retour</a>
</div>

</body>
</html>
